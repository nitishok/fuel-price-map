name: Refresh fuel prices & redeploy

on:
  schedule:
    - cron: '0 * * * *'   # every hour (UTC) — scraper takes ~10 min
  workflow_dispatch:        # also triggerable manually from the Actions tab

permissions:
  contents: write           # commit data.json back to main
  pages: write              # deploy to GitHub Pages
  id-token: write           # required by actions/deploy-pages

concurrency:
  group: pages
  cancel-in-progress: false  # never cancel an in-progress Pages deploy

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        run: python3 scraper/scrape.py --verbose

      - name: Generate city pages
        run: python3 scraper/generate_city_pages.py

      - name: Commit data + city pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data-yesterday.json history.json
          git add mumbai/ delhi/ bangalore/ hyderabad/ ahmedabad/ \
                  chennai/ kolkata/ surat/ pune/ jaipur/ \
                  lucknow/ kanpur/ nagpur/ indore/ bhopal/ \
                  visakhapatnam/ patna/ vadodara/ kochi/ coimbatore/ \
                  guwahati/ ranchi/ chandigarh/ thiruvananthapuram/ varanasi/
          git diff --staged --quiet \
            && echo "Nothing changed — skipping commit" \
            || git commit -m "data: refresh prices + city pages $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
